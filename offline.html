<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ethyria – Offline</title>
    <link rel="icon" href="assets/Ethyria_new_app_icon.png" type="image/png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          #100c1f 0%,
          #07112b 50%,
          #001a79 100%
        );
        font-family: Inter, Arial, Helvetica, sans-serif;
        color: #d9e4ff;
        padding: 24px;
      }
      .card {
        text-align: center;
        max-width: 440px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 48px 32px;
      }
      .icon {
        font-size: 64px;
        margin-bottom: 24px;
        display: block;
      }
      h1 {
        font-family: Poppins, Arial, sans-serif;
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(90deg, #22d3ee, #60a5fa, #a78bfa, #f0abfc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
        line-height: 1.3;
      }
      p {
        font-size: 15px;
        line-height: 1.7;
        color: #91a0c6;
        margin-bottom: 24px;
      }
      .btn {
        display: inline-block;
        padding: 14px 32px;
        font-family: Poppins, Arial, sans-serif;
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #01bfff, #0066ff);
        border-radius: 12px;
        text-decoration: none;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(1, 191, 255, 0.25);
      }
      .btn:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="icon" aria-hidden="true">🌙</span>
      <h1>Du bist offline</h1>
      <p>
        Deine Träume warten auf dich — sobald du wieder online bist. Prüfe deine
        Internetverbindung und versuche es erneut.
      </p>
      <button class="btn" onclick="location.reload()">Erneut versuchen</button>
    </div>
  </body>
</html>
